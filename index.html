<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Keiba Tech IT Consultancy</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-light: #ffffff;
      --text-light: #111111;
      --bg-dark: #0f0f0f;
      --text-dark: #f5f5f5;
      --accent: #000000;
      --muted-light: #666;
      --muted-dark: #bbb;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }
    html { scroll-behavior: smooth; }
    body { background: var(--bg-light); color: var(--text-light); transition: 0.3s ease; line-height: 1.6; }
    body.dark { background: var(--bg-dark); color: var(--text-dark); }

header {
  position: fixed;
  top: 0;
  width: 100%;
  z-index: 1000;
  background: rgba(255, 255, 255, 0.92);
  border-bottom: 1px solid #ececec;
  backdrop-filter: blur(10px);
}

body.dark header {
  background: rgba(15, 15, 15, 0.92);
  border-bottom-color: #252525;
}
   nav {
  max-width: 1200px;
  margin: auto;
  padding: 1rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
}
 nav ul {
  list-style: none;
  display: flex;
  gap: 1.2rem;
  flex-wrap: wrap;
}

    nav a {
      text-decoration: none;
      color: inherit;
      font-weight: 500;
    }

.toggle {
  cursor: pointer;
  border: 1px solid #ccc;
  border-radius: 999px;
  background: transparent;
  color: inherit;
  padding: 0.4rem 0.85rem;
  font-size: 0.8rem;
}
    section {
      max-width: 1200px;
      margin: auto;
      padding: 5.5rem 1rem;
    }

.hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 1.2rem;
  padding-top: 7rem;
}

.hero-actions {
  display: flex;
  gap: 0.8rem;
  flex-wrap: wrap;
}
    }
    h1 { font-size: clamp(2.3rem, 5vw, 3.5rem); line-height: 1.2; }
    h2 { font-size: clamp(1.7rem, 3.2vw, 2.2rem); margin-bottom: 0.85rem; }
    p { max-width: 860px; }


    }
    .btn.primary { background: var(--accent); color: #fff; }
    .btn:hover { background: var(--accent); color: #fff; }
    body.dark .btn { border-color: #fff; }
    body.dark .btn.primary, body.dark .btn:hover { background: #fff; color: #000; }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.2rem; }
    .card { border: 1px solid #e7e7e7; border-radius: 8px; padding: 1.2rem; background: rgba(255,255,255,0.65); }
    body.dark .card { border-color: #2a2a2a; background: rgba(0,0,0,0.2); }

    .card h3 { margin-bottom: 0.6rem; font-size: 1.1rem; }
    .bullet-list { padding-left: 1.1rem; display: grid; gap: 0.4rem; }
    .contact-wrap {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      align-items: start;
    }



    @media (max-width: 860px) {
      nav { flex-direction: column; }
    }

    @media (max-width: 768px) {
      nav {
        flex-direction: column;
      }

      .hero {
        padding-top: 7rem;
      }
    }
  </style>
</head>
<body>

</body>
</html>
